name: 03-retrain-on-drift

on:
  repository_dispatch:
    types: [drift-detected]
  workflow_dispatch:

defaults:
  run:
    working-directory: lessons/03-drift-detection

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: echo "retraining triggered by ${{ github.event_name }} (source run ${{ github.event.client_payload.source_run_id || 'manual' }})"
      - run: uv run python -m src.pipeline.train_pipeline
      - uses: actions/upload-artifact@v4
        with:
          name: churn-model-retrained
          path: lessons/03-drift-detection/artifacts/
